name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - run: make fmt-check
      - run: make validate
      - run: make lint
      - run: make build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - run: make test
      - name: Upload dist for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  visual:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - name: Restore dist from build job
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - name: Restore dist from build job
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Reuse Playwright's Chromium so Lighthouse has a real browser on
      # the runner. `chrome-launcher` (used by lhci) honours CHROME_PATH.
      - name: Install Chromium for Lighthouse
        run: npx playwright install --with-deps chromium
      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          CHROME_PATH="$(node -e 'const p=require("@playwright/test").chromium.executablePath(); process.stdout.write(p)')"
          export CHROME_PATH
          npm run lighthouse

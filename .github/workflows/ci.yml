name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - run: make fmt-check
      - run: make validate
      - run: make lint
      - run: make build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_STATS_TOKEN: ${{ secrets.PROJECT_STATS_TOKEN }}
      - run: make test

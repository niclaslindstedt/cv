name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run tests
        run: make test

      - name: Generate CHANGELOG
        run: bash scripts/generate-changelog.sh "${{ steps.tag.outputs.tag }}"

      - name: Update version in package.json
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          npm version "${VERSION#v}" --no-git-tag-version

      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json package-lock.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(release): update changelog and versions for ${{ steps.tag.outputs.tag }}"
          git push origin main

      - name: Retag at release commit
        run: |
          git tag -f "${{ steps.tag.outputs.tag }}" HEAD
          git push origin "${{ steps.tag.outputs.tag }}" --force

      - name: Build
        run: make build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file CHANGELOG.md
